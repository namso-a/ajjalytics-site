<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="accentSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6EE7B7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Logo mark: Stylized "A" made from code brackets < / > -->
  <g transform="translate(100 150)">
    <!-- Left bracket forming left leg of A -->
    <path d="M-42 50 L-70 0 L-42 -50" fill="none" stroke="url(#accent)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right bracket forming right leg of A -->
    <path d="M42 50 L70 0 L42 -50" fill="none" stroke="url(#accent)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Forward slash (the crossbar / code reference) -->
    <line x1="18" y1="-38" x2="-18" y2="38" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
    <!-- Dot / cursor blink -->
    <circle cx="0" cy="-58" r="5" fill="url(#accent)"/>
  </g>

  <!-- Wordmark -->
  <text x="195" y="165" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace" font-size="56" fill="#E2E8F0" font-weight="600" letter-spacing="2">ajjalytics</text>

  <!-- Subtle tagline -->
  <text x="197" y="198" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="14" fill="#64748B" letter-spacing="5">.dev</text>
</svg>